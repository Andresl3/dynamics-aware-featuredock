<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Dyna-1-FeatureDock architecture</title>
<desc>Protein complex feeds two parallel featurization branches, static 80-channel grid features and a Dyna-1 dynamics channel, which merge into an 81-channel augmented tensor, pass through a transformer scoring network, and produce a probability map used for virtual screening.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<style>
  text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; }
  .box { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text.th { fill: #2C2C2A; }
  .c-gray text.ts { fill: #444441; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text.th { fill: #04342C; }
  .c-teal text.ts { fill: #085041; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue text.th { fill: #042C53; }
  .c-blue text.ts { fill: #0C447C; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text.th { fill: #26215C; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text.th { fill: #4A1B0C; }
  .c-coral text.ts { fill: #712B13; }
</style>

<g class="c-gray">
<rect x="230" y="40" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central">Protein complex (PDBbind)</text>
</g>
<line x1="340" y1="84" x2="340" y2="100" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M340 100 L190 100 L190 110" fill="none" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M340 100 L490 100 L490 110" fill="none" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="70" y="110" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="190" y="130" text-anchor="middle" dominant-baseline="central">Static featurization</text>
<text class="ts" x="190" y="150" text-anchor="middle" dominant-baseline="central">80 channels / grid point</text>
</g>

<g class="c-teal">
<rect x="370" y="110" width="240" height="56" rx="8" stroke-width="1"/>
<text class="th" x="490" y="130" text-anchor="middle" dominant-baseline="central">Dyna-1 dynamics channel</text>
<text class="ts" x="490" y="150" text-anchor="middle" dominant-baseline="central">µs-ms exchange, RelaxDB + BMRB</text>
</g>

<path d="M190 166 L190 195 L300 195 L300 210" fill="none" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M490 166 L490 195 L380 195 L380 210" fill="none" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-blue">
<rect x="180" y="210" width="320" height="56" rx="8" stroke-width="1"/>
<text class="th" x="340" y="230" text-anchor="middle" dominant-baseline="central">Augmented feature tensor</text>
<text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">6x80 to 6x81 channels / grid point</text>
</g>
<line x1="340" y1="266" x2="340" y2="290" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="210" y="290" width="260" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="312" text-anchor="middle" dominant-baseline="central">Transformer scoring network</text>
</g>
<line x1="340" y1="334" x2="340" y2="358" stroke="#5f5e5a" stroke-width="0.5" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="200" y="358" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="378" text-anchor="middle" dominant-baseline="central">Geometric probability map</text>
<text class="ts" x="340" y="398" text-anchor="middle" dominant-baseline="central">compound ranking / virtual screening</text>
</g>
</svg>
